<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- AOS -->
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <!-- Tailwind -->
    <link rel="stylesheet" href="css/style.css">
    <title>Muhammad Halim Amrin — Portfolio</title>
</head>

<body class="font-[Poppins,sans-serif] bg-neutral-200 text-neutral-800">

    <!-- ===== NAVBAR ===== -->
    <header class="sticky top-0 z-50 bg-white/75 backdrop-blur-md border-b border-black/10">
        <nav class="max-w-6xl mx-auto px-8 h-20 flex items-center justify-between text-lg">
            <a href="#" class="font-[Outfit,sans-serif] font-extrabold text-2xl text-neutral-800 tracking-tight">
                .Lim
            </a>
            <ul class="flex gap-8">
                <li><a href="#about"    class="text-neutral-600 hover:text-neutral-900 relative after:absolute after:bottom-0 after:left-0 after:h-0.5 after:w-0 after:bg-neutral-800 after:transition-all hover:after:w-full">About</a></li>
                <li><a href="#projects" class="text-neutral-600 hover:text-neutral-900 relative after:absolute after:bottom-0 after:left-0 after:h-0.5 after:w-0 after:bg-neutral-800 after:transition-all hover:after:w-full">Projects</a></li>
                <li><a href="#contact"  class="text-neutral-600 hover:text-neutral-900 relative after:absolute after:bottom-0 after:left-0 after:h-0.5 after:w-0 after:bg-neutral-800 after:transition-all hover:after:w-full">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>

        <!-- ===== HERO / ABOUT ===== -->
        <section id="about" class="max-w-6xl mx-auto px-8 min-h-[calc(100vh-5rem)] flex flex-col-reverse md:flex-row items-center gap-8 py-16">

            <div class="flex-1 flex flex-col gap-4 text-center md:text-left" data-aos="fade-right" data-aos-delay="200">
                <h1 class="font-[Outfit,sans-serif] font-extrabold text-5xl md:text-6xl text-neutral-800 leading-tight">
                    MUHAMMAD<br>HALIM AMRIN
                </h1>
                <p class="text-xl text-neutral-500">
                    Artificial Intelligence Operations (AIOps) Engineer
                </p>
                <div class="flex gap-4 mt-2 justify-center md:justify-start">
                    <button class="px-7 py-3 rounded-full font-bold bg-neutral-800 text-white border-2 border-neutral-800 transition hover:bg-neutral-600 hover:scale-[1.02] hover:shadow-lg cursor-pointer">
                        Contact Me
                    </button>
                    <a href="https://drive.google.com/file/d/10dLZ1XDsUsZGeNTrd-0WfNZ8Pva5dnKK/view?usp=drive_link"
                       target="_blank" rel="noopener noreferrer"
                       class="px-7 py-3 rounded-full font-bold border-2 border-neutral-800 text-neutral-800 transition">
                        Download CV
                    </a>
                </div>
            </div>

            <div class="flex-1 flex justify-center" data-aos="fade-left" data-aos-delay="400">
                <img src="assets/profile.jpeg"
                     alt="Muhammad Halim Amrin"
                     class="w-64 h-64 md:w-80 md:h-80 rounded-full object-cover border-8 border-white shadow-2xl">
            </div>

        </section>

    </main>

    <!-- ===== FOOTER ===== -->
    <footer class="bg-neutral-800 text-white/60 py-8 px-8 flex flex-col items-center gap-3">
        <span class="font-[Outfit,sans-serif] font-extrabold text-2xl text-white tracking-wide">.Lim</span>
        <nav class="flex flex-wrap justify-center gap-6" aria-label="Footer navigation">
            <a href="#about"    class="text-sm hover:text-white transition">About</a>
            <a href="#projects" class="text-sm hover:text-white transition">Projects</a>
            <a href="#contact"  class="text-sm hover:text-white transition">Contact</a>
        </nav>
        <p class="text-xs mt-1">&copy; 2026 Muhammad Halim Amrin. All rights reserved.</p>
    </footer>

    <!-- AOS -->
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });
    </script>
    <script src="js/script.js"></script>
</body>

</html>
