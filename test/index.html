<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap"
        rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Belajar Navbar</title>
</head>

<body style="font-family: 'Google Sans Flex', sans-serif;">

    <header class="text-lg z-50 top-0 sticky xl:px-60 px-16 shadow-md bg-white">

        <nav class="h-16 flex items-center justify-between">
            <a href="#">Lim.</a>
            <ul class="hidden gap-5 md:flex">
                <li><a href="#about">About</a></li>
                <li><a href="#about">Contact</a></li>
            </ul>

            <button id="hamburger" class="md:hidden cursor-pointer flex flex-col gap-1.5">
                <span class="block w-6 h-0.5 bg-gray-800"></span>
                <span class="block w-6 h-0.5 bg-gray-800"></span>
                <span class="block w-6 h-0.5 bg-gray-800"></span>
            </button>
        </nav>


        <div id="overlay"
             class="fixed inset-0 bg-black/40 backdrop-blur-sm
                    opacity-0 pointer-events-none
                    transition-opacity duration-300">
        </div>

        <div id="nav-menu2"
             class="fixed top-0 right-0 h-full w-3/4 max-w-sm
                    bg-white shadow-2xl
                    translate-x-full
                    transition-transform duration-300 ease-in-out
                    p-10 flex flex-col gap-6 z-50">

            <div class="flex justify-between items-center">
                <a href="#" class="font-bold text-xl">Lim.</a>
                <button id="burglir" class="text-gray-500 hover:text-gray-900 text-2xl cursor-pointer">✕</button>
            </div>

            <span class="block h-0.5 bg-gray-100"></span>

            <ul class="flex flex-col gap-4 text-lg">
                <li><a href="#about" class="text-gray-600 hover:text-gray-900">About</a></li>
                <li><a href="#about" class="text-gray-600 hover:text-gray-900">Contact</a></li>
            </ul>

        </div>

    </header>

    <!-- Konten dummy -->
    <main class="max-w-6xl xl:px-60 px-16 py-16">
        <p class="text-gray-400">Scroll ke bawah untuk test sticky navbar...</p>
        <div class="h-screen"></div>
        <div class="h-screen"></div>
    </main>

    <script>
        const hamburger = document.getElementById('hamburger');
        const burglir   = document.getElementById('burglir');
        const drawer    = document.getElementById('nav-menu2');
        const overlay   = document.getElementById('overlay');

        function openDrawer() {
            // Slide drawer masuk: hapus translate-x-full, tambah translate-x-0
            drawer.classList.remove('translate-x-full');
            drawer.classList.add('translate-x-0');

            // Fade in overlay
            overlay.classList.remove('opacity-0', 'pointer-events-none');
            overlay.classList.add('opacity-100');
        }

        function closeDrawer() {
            // Slide drawer keluar
            drawer.classList.remove('translate-x-0');
            drawer.classList.add('translate-x-full');

            // Fade out overlay
            overlay.classList.remove('opacity-100');
            overlay.classList.add('opacity-0', 'pointer-events-none');
        }

        hamburger.addEventListener('click', openDrawer);
        burglir.addEventListener('click', closeDrawer);

        // Klik overlay juga menutup drawer
        overlay.addEventListener('click', closeDrawer);
    </script>

</body>
</html>
